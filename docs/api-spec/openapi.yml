openapi: 3.0.3
info:
  title: Authorization API
  description: 認可サーバーのAPI群です。
  version: 1.0.0
  contact:
    name: API開発チーム
    email: satoshi.nagashiba@gmail.com

servers:
  - url: https://apis.authorization.com
    description: 本番環境
  - url: https://apis-stg.authorization.com
    description: ステージング環境
  - url: https://apis-dev.authorization.com
    description: 開発環境
  - url: https://apis.authorization-go.dev
    description: ローカルGo環境
  - url: https://apis.authorization-php.dev/api
    description: ローカルPHP環境（Laravel の /api プレフィックス。/v1 は付けない）
  - url: https://apis.authorization-python.dev
    description: ローカルPython環境
  - url: https://apis.authorization-ts.dev
    description: ローカルTypeScript環境

paths:
  /auth/login:
    get:
      summary: ログイン情報を取得します
      tags:
        - auth
      responses:
        '200':
          description: 成功時にレスポンスを返します。
        '404':
          description: ログインページが存在しない場合のエラー

  /auth/invitation/{token}:
    get:
      summary: 招待URLトークンを検証し、ログイン情報を取得します
      tags:
        - auth
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
          description: 招待トークン
      responses:
        '200':
          description: 成功時にレスポンスを返します。
        '404':
          description: ログインページが存在しない場合のエラー
        '500':
          description: 招待トークンが不正な場合のエラー

  /auth/google/redirect:
    get:
      summary: Googleログインページへリダイレクトします
      tags:
        - auth
      responses:
        '200':
          description: 成功時にレスポンスを返します。
        '500':
          description: Googleログインに失敗した場合のエラー

  /auth/google/callback:
    get:
      summary: Googleログインからのコールバックを受け取ります
      tags:
        - auth
      responses:
        '200':
          description: 成功時にレスポンスを返します。
        '500':
          description: Googleログインに失敗した場合のエラー

  /auth/me:
    get:
      summary: 自分自身のプロフィールを取得します
      description: staff_id クッキーで認証済みのユーザー情報を返します。ログイン判定・ヘッダー表示などに使用します。
      tags:
        - auth
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthMe'
        '401':
          description: 未認証（staff_id クッキーなし、または復号失敗）
        '404':
          description: スタッフが存在しない

  /auth/logout:
    get:
      summary: ログアウトします
      tags:
        - auth
      responses:
        '200':
          description: 成功時にレスポンスを返します。
        '500':
          description: ログアウトに失敗した場合のエラー

  /clients:
    get:
      summary: クライアント一覧
      tags:
        - clients
      parameters:
        - name: keyword
          in: query
          required: false
          description: キーワード
          schema:
            type: string
        - name: start_from
          in: query
          required: false
          description: 利用開始日 From
          schema:
            type: string
            format: date
        - name: start_to
          in: query
          required: false
          description: 利用開始日 To
          schema:
            type: string
            format: date
        - name: statuses
          in: query
          required: false
          description: 状態（複数指定可）
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
      responses:
        '200':
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Clients'
        '404':
          description: ユーザーが存在しない場合のエラー

  /clients/{id}:
    get:
      summary: クライアント検索
      tags:
        - clients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: クライアントID
      responses:
        '200':
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Client'
        '404':
          description: ユーザーが存在しない場合のエラー

  /clients/store:
    post:
      summary: クライアント登録
      tags:
        - clients
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientCreate'
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '400':
          description: リクエストが不正です
        '500':
          description: サーバーエラー

  /clients/{id}/update:
    put:
      summary: クライアント変更
      tags:
        - clients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: クライアントID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ClientUpdate'
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '400':
          description: リクエストが不正です
        '500':
          description: サーバーエラー

  /clients/{id}/delete:
    delete:
      summary: クライアント削除
      tags:
        - clients
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: クライアントID
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '404':
          description: ユーザーが存在しない場合のエラー

  /staffs:
    get:
      summary: スタッフ一覧
      tags:
        - staff
      parameters:
        - name: keyword
          in: query
          required: false
          description: キーワード
          schema:
            type: string
        - name: roles
          in: query
          required: false
          description: 権限（複数指定可）
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
        - name: statuses
          in: query
          required: false
          description: 状態（複数指定可）
          schema:
            type: array
            items:
              type: integer
          style: form
          explode: true
      responses:
        '200':
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffList'
        '404':
          description: ユーザーが存在しない場合のエラー

  /staffs/{id}/updateRole:
    patch:
      summary: 権限を更新します
      tags:
        - staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: スタッフID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - role
              properties:
                role:
                  type: integer
                  format: int64
                  description: 権限種別
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '400':
          description: リクエストが不正です
        '404':
          description: ユーザーが存在しない場合のエラー
        '500':
          description: サーバーエラー

  /staffs/{id}/delete:
    delete:
      summary: スタッフを削除
      tags:
        - staff
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: スタッフID
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '404':
          description: スタッフが存在しない場合のエラー

  /invitation:
    get:
      summary: 招待URLを取得します
      tags:
        - invitation
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: 招待用トークン（ハッシュ）を含むURL
                    example: "7f3a9c2e1b8d4f6a0e5c7b2d9f1a4e8c0d3b6a9f2e5c8d1b4a7f0e3c6d9b2a5f8"
        '404':
          description: スタッフが存在しない場合のエラー

  /invitation/issue:
    get:
      summary: 招待URLを発行します
      tags:
        - invitation
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  url:
                    type: string
                    description: 招待用トークン（ハッシュ）を含むURL
                    example: "/auth/invitation/7f3a9c2e1b8d4f6a0e5c7b2d9f1a4e8c0d3b6a9f2e5c8d1b4a7f0e3c6d9b2a5f8"

  /gate/issue:
    get:
      summary: JWTを発行する
      tags:
        - gate
      description: クライアントに対してJWTを発行します。
      security:
        - bearerAuth: []    # アクセストークン
      parameters:
        - name: member
          in: query
          required: true
          schema:
            type: string
          description: クライアント会員ID
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "SUCCESS"
        '400':
          description: リクエストが不正です
        '500':
          description: サーバーエラー

  /gate/client/{identifier}/verify:
    get:
      summary: JWTを検証する
      tags:
        - gate
      parameters:
        - name: identifier
          in: path
          required: true
          schema:
            type: string
          description: クライアント識別名

        - name: token
          in: query
          required: true
          schema:
            type: string
          description: クライアント識別名
      responses:
        '200':
          description: 成功時にレスポンスを返します。
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Payload'
        '400':
          description: リクエストが不正です
        '404':
          description: JWTが見つかりませんでした。
        '500':
          description: サーバーエラー

  /notifications:
    get:
      summary: 通知一覧（メタデータ含む）
      description: |
        通知の一覧を返す。各アイテムにメタデータを含む。

        **モダンな点:** cursor ベースのページネーションを採用する。
      tags:
        - notifications
      security:
        - bearerAuth: []
      parameters:
        - name: cursor
          in: query
          required: false
          schema:
            type: string
          description: 次ページ取得用の不透明カーソル（初回は省略可）
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
          description: 1ページあたりの件数
      responses:
        '200':
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationListResponse'
        '401':
          description: 未認証
        '500':
          description: サーバーエラー

    post:
      summary: 通知のトリガー（内部/システム）
      description: |
        内部ジョブや連携システムから通知を発火する。利用者向け一覧取得とは用途が異なる。

        **モダンな点:** べき等キー（`Idempotency-Key`）を許容する。
      tags:
        - notifications
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          schema:
            type: string
          description: 同一キーでの重複送信を冪等に扱う
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationTriggerRequest'
      responses:
        '200':
          description: 受理・作成結果
        '202':
          description: 非同期受理
        '409':
          description: べき等キー競合など
        '500':
          description: サーバーエラー

    patch:
      summary: 一括既読更新
      description: |
        複数通知を一括で既読などの状態に更新する。

        **モダンな点:** 複数 ID 指定や `all: true` を Body で受け取る。
      tags:
        - notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationBulkPatchRequest'
      responses:
        '200':
          description: 更新成功
        '400':
          description: リクエストが不正
        '401':
          description: 未認証
        '500':
          description: サーバーエラー

  /notifications/counts:
    get:
      summary: 未読・全件などのサマリー
      description: |
        未読件数・全件数など、通知まわりの集計を返す。

        **モダンな点:** 複数種類のカウントを一度に返す。
      tags:
        - notifications
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 正常応答
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/NotificationCounts'
        '401':
          description: 未認証
        '500':
          description: サーバーエラー

  /notifications/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: 通知 ID

    patch:
      summary: 単一通知の状態更新（既読等）
      description: |
        1件の通知に対する部分更新（既読フラグなど）。

        **モダンな点:** Partial Update（差分更新）の原則に従う。
      tags:
        - notifications
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NotificationPatchRequest'
      responses:
        '200':
          description: 更新成功
        '400':
          description: リクエストが不正
        '401':
          description: 未認証
        '404':
          description: 通知が存在しない
        '500':
          description: サーバーエラー

components:
  schemas:
    AuthMe:
      type: object
      description: ログイン中スタッフのプロフィール情報
      required:
        - staff_id
        - name
      properties:
        staff_id:
          type: integer
          format: int64
          description: スタッフID
          example: 1
        name:
          type: string
          description: 表示名
          example: "長柴聡史"
        avatar:
          type: string
          nullable: true
          description: アバター画像URL（未設定時は null）
          example: "https://lh3.googleusercontent.com/a/example"

    ClientCreate:
      type: object
      description: クライアント登録情報を表すオブジェクトです。
      required:
        - name
        - post_code
        - pref
        - city
        - address
        - tel
        - email
      properties:
        name:
          type: string
          example: "株式会社ストラテジックインサイト"
        post_code:
          type: string
          example: "1070061"
        pref:
          type: string
          example: "東京都"
        city:
          type: string
          example: "港区北青山"
        address:
          type: string
          example: "二丁目5番8号"
        building:
          type: string
          example: "青山OMスクエア"
        tel:
          type: string
          example: "0312345678"
        email:
          type: string
          example: "nagashibas@sii-japan.co.jp"

    ClientUpdate:
      type: object
      description: クライアント更新情報（対象 ID はパス /clients/{id}/update で指定。サーバではルートとボディをマージします）。
      properties:
        name:
          type: string
        identifier:
          type: string
        post_code:
          type: string
        pref:
          type: string
        city:
          type: string
        address:
          type: string
        building:
          type: string
          nullable: true
        tel:
          type: string
        email:
          type: string
          format: email
        status:
          type: integer

    Client:
      type: object
      description: クライアント情報を表すオブジェクトです。
      required:
        - id
        - name
        - identifier
        - post_code
        - pref
        - city
        - address
        - tel
        - email
        - status
        - created_at
        - created_name
        - updated_at
        - updated_name
        - version
      properties:
        id:
          type: integer
          format: int64
          example: "1"
        name:
          type: string
          example: "株式会社ストラテジックインサイト"
        identifier:
          type: string
          example: "sii"
        post_code:
          type: string
          example: "1070061"
        pref:
          type: string
          example: "東京都"
        city:
          type: string
          example: "港区北青山"
        address:
          type: string
          example: "二丁目5番8号"
        building:
          type: string
          example: "青山OMスクエア"
        tel:
          type: string
          example: "0312345678"
        email:
          type: string
          example: "0312345678"
        status:
          type: integer
          example: 1
        start_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        stop_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        created_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        created_name:
          type: string
          example: "長柴聡史"
        updated_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        updated_name:
          type: string
          example: "長柴聡史"
        deleted_at:
          type: string
          format: date-time
          example: "2025-11-01T10:00:00Z"
        deleted_name:
          type: string
          example: "長柴聡史"
        version:
          type: integer
          example: "1"

    Clients:
      type: array
      description: クライアントのリストです。
      items:
        $ref: '#/components/schemas/Client'

    StaffStatusOption:
      type: object
      description: 状態の1選択肢（連想配列）
      required:
        - value
        - label
      properties:
        value:
          type: integer
          format: int64
          description: 状態コード（例：1=有効、0=無効）
          example: 1
        label:
          type: string
          description: 表示ラベル
          example: "有効"

    StaffStatus:
      type: object
      description: |
        状態。現在値に加え、取り得る選択肢を choices で返す（UI のプルダウン等に利用）。
      required:
        - value
        - label
        - choices
      properties:
        value:
          type: integer
          format: int64
          description: 現在の状態コード
          example: 1
        label:
          type: string
          description: 現在の状態の表示ラベル
          example: "有効"
        choices:
          type: array
          description: 選択可能な状態の一覧（各要素は value / label のオブジェクト）
          items:
            $ref: '#/components/schemas/StaffStatusOption'
          example:
            - value: 1
              label: "有効"
            - value: 0
              label: "無効"

    StaffRoleOption:
      type: object
      description: 権限の1選択肢（連想配列）
      required:
        - value
        - label
      properties:
        value:
          type: integer
          format: int64
          description: 権限コード（例：1=管理者、2=メンバー）
          example: 1
        label:
          type: string
          description: 表示ラベル
          example: "管理者"

    StaffRole:
      type: object
      description: |
        スタッフの権限。現在値に加え、取り得る選択肢を choices で返す。
      required:
        - value
        - label
        - choices
      properties:
        value:
          type: integer
          format: int64
          description: 現在の権限コード
          example: 1
        label:
          type: string
          description: 現在の権限の表示ラベル
          example: "管理者"
        choices:
          type: array
          description: 選択可能な権限の一覧（各要素は value / label のオブジェクト）
          items:
            $ref: '#/components/schemas/StaffRoleOption'
          example:
            - value: 1
              label: "管理者"
            - value: 2
              label: "メンバー"

    Staff:
      type: object
      description: |
        スタッフ一覧の1行です。active / role はフラットな enum ではなく、
        現在値と選択肢一覧を含むオブジェクトで返す。
      required:
        - id
        - name
        - email
        - active
        - role
        - createdAt
        - updatedAt
      properties:
        id:
          type: integer
          format: int64
          example: 1
        name:
          type: string
          description: 表示名
          example: "山田 太郎"
        email:
          type: string
          format: email
          example: "yamada@example.com"
        active:
          $ref: '#/components/schemas/StaffStatus'
        role:
          $ref: '#/components/schemas/StaffRole'
        createdAt:
          type: string
          description: 登録日時（表示形式はAPI実装に依存）
          example: "2026-01-15 09:30"
        updatedAt:
          type: string
          description: 更新日時（表示形式はAPI実装に依存）
          example: "2026-01-20 10:00"
      example:
        id: 1
        name: "山田 太郎"
        email: "yamada@example.com"
        active:
          value: 1
          label: "有効"
          choices:
            - value: 1
              label: "有効"
            - value: 0
              label: "無効"
        role:
          value: 1
          label: "管理者"
          choices:
            - value: 1
              label: "管理者"
            - value: 2
              label: "メンバー"
        createdAt: "2026-01-15 09:30"
        updatedAt: "2026-01-20 10:00"

    StaffList:
      type: array
      description: スタッフのリストです。
      items:
        $ref: '#/components/schemas/Staff'

    Payload:
      type: object
      description: JWTのPayload情報を表すオブジェクトです。
      required:
        - iss
        - sub
        - aud
        - exp
        - iat
        - nbf
        - jti
      properties:
        iss:
          type: string
          description: 固定値
          example: "sii-auth"
        sub:
          type: string
          description: クライアント会員番号（半角英数字）
          example: "A123456789"
        aud:
          type: string
          description: クライアント識別名
          example: ":identifier"
        exp:
          type: integer
          format: int64
          description: UNIXタイムスタンプ（秒単位）
          example: "1560000000"
        iat:
          type: integer
          format: int64
          description: UNIXタイムスタンプ（秒単位）
          example: "1560000000"
        nbf:
          type: integer
          format: int64
          description: UNIXタイムスタンプ（秒単位）
          example: "1560000000"
        jti:
          type: string
          format: uuid
          description: JWTを発行するたびに割り振られる重複しないID（UUID v4）
          example: "f55a406c-8d3c-4306-836f-5cc0d508a07f"

    Notification:
      type: object
      description: 通知1件（メタデータを含む。実フィールドは実装に依存）
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        read_at:
          type: string
          format: date-time
          nullable: true
        archived_at:
          type: string
          format: date-time
          nullable: true
        metadata:
          type: object
          additionalProperties: true

    NotificationListResponse:
      type: object
      description: cursor ページネーション付き一覧
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/Notification'
        next_cursor:
          type: string
          nullable: true
          description: 次ページがなければ null

    NotificationCounts:
      type: object
      description: 複数種類のカウントを一度に返す
      additionalProperties:
        type: integer
        format: int64
      example:
        unread: 3
        total: 42

    NotificationPatchRequest:
      type: object
      description: 単一通知の差分更新（送ったフィールドのみ更新）
      properties:
        read:
          type: boolean
        archived:
          type: boolean

    NotificationBulkPatchRequest:
      type: object
      description: 一括更新。ids または all のいずれかを指定
      properties:
        ids:
          type: array
          items:
            type: string
            format: uuid
        all:
          type: boolean
          description: true のとき対象を一括指定（運用上の制約は実装側）
        read:
          type: boolean

    NotificationTriggerRequest:
      type: object
      description: 内部/システムからの通知発火ペイロード（詳細は実装に依存）
      properties:
        type:
          type: string
        payload:
          type: object
          additionalProperties: true

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

tags:
  - name: auth
    description: 認証API
  - name: clients
    description: クライアントAPI
  - name: staff
    description: スタッフAPI
  - name: invitation
    description: 招待API
  - name: gate
    description: 認可API
  - name: notifications
    description: 通知API
