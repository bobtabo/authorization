# Cloudflare Pages（Git 連携）用のローカル確認・設定の目安
# ダッシュボード側でも次と一致させる:
#   ルートディレクトリ: docs/ui-flow（またはこのリポジトリ構成に合わせたパス）
#   ビルドコマンド: npm ci && npm run build
#   ビルド出力ディレクトリ: dist
#
# functions/ はこのファイルと同じディレクトリに置く（dist の外）。Pages が自動で拾う。

name = "authorization-ui-flow"
compatibility_date = "2024-12-01"
pages_build_output_dir = "dist"
