name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  lint-openapi:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate OpenAPI
        uses: docker://openapitools/openapi-generator-cli:v7.5.0
        with:
          args: validate -i docs/openapi.yml

  deploy-pages:
    if: github.ref == 'refs/heads/main'
    needs: lint-openapi
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4