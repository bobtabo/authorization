# Go CI ワークフロー
# developブランチのbackends/go-gin/**変更時にCIを実行
name: Go CI

on:
  push:
    branches:
      - develop
    paths:
      - 'backends/go-gin/**'
  workflow_dispatch:

jobs:
  test:
    # Ubuntu ランナーを使用
    runs-on: ubuntu-latest

    # サービスコンテナ: MySQLとRedisをテスト用に起動
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 'docker#DOCKER1234'
          MYSQL_DATABASE: 'authorization'
          MYSQL_USER: 'develop'
          MYSQL_PASSWORD: 'docker#DOCKER1234'
        options: --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    # CI実行ステップ
    steps:
      - uses: actions/checkout@v4

      # Go 1.24 をセットアップ
      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.24'

      # Go 依存関係をインストール
      - name: Install dependencies
        run: go mod download
        working-directory: backends/go-gin

      # .env ファイルをコピーしてCI環境に適応
      - name: Prepare .env
        run: |
          cp .env .env.ci
          sed -i 's/host\.docker\.internal/127.0.0.1/g' .env.ci
          echo 'DB_DATABASE=authorization_test' >> .env.ci
        working-directory: backends/go-gin

      # テスト用DBを作成（TestMain の runSchemaSql がテーブルを管理するためスキーマ投入は不要）
      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -u develop -p'docker#DOCKER1234' -e "CREATE DATABASE IF NOT EXISTS authorization_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"

      # テストを実行
      - name: Run tests
        run: go test ./tests/...
        working-directory: backends/go-gin
        env:
          ENV_FILE: .env.ci
