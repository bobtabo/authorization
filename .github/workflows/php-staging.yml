# PHP Staging CI ワークフロー
# stagingブランチの変更時にCIを実行
name: PHP Staging CI

# トリガー: stagingブランチへのプッシュで、backends/php-laravel/** の変更時のみ実行
on:
  push:
    branches:
      - staging
    paths:
      - 'backends/php-laravel/**'

jobs:
  test:
    # 共通テンプレート php.yml を使用し、staging環境の設定を渡す
    uses: ./.github/workflows/php.yml
    with:
      env_name: 'testing'
      db_name: 'authorization_test'
      db_user: 'develop'
      db_password: 'docker#DOCKER1234'
      db_host: 'mysql'
      redis_host: 'redis'
      redis_port: '6379'
