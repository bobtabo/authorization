# PHP CI 共通テンプレート
# Reusable Workflowとして、環境別のCIを実行する
name: PHP CI Template

# workflow_call で呼び出され、inputs を受け取る
on:
  workflow_call:
    inputs:
      env_name:
        required: true
        type: string
      db_name:
        required: true
        type: string
      db_user:
        required: true
        type: string
      db_password:
        required: true
        type: string
      redis_host:
        required: true
        type: string
      redis_port:
        required: true
        type: string

jobs:
  test:
    # Ubuntu ランナーを使用
    runs-on: ubuntu-latest

    # サービスコンテナ: MySQLとRedisをテスト用に起動
    services:
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: ${{ inputs.db_password }}
          MYSQL_DATABASE: ${{ inputs.db_name }}
          MYSQL_USER: ${{ inputs.db_user }}
          MYSQL_PASSWORD: ${{ inputs.db_password }}
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=3

      redis:
        image: redis:latest
        ports:
          - ${{ inputs.redis_port }}:6379
        options: --health-cmd="redis-cli ping" --health-interval=10s --health-timeout=5s --health-retries=3

    # CI実行ステップ
    steps:
      - uses: actions/checkout@v4

      # PHP 8.4 をセットアップし、pdo_mysql拡張を有効化
      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: pdo, pdo_mysql

      # Composer 依存関係をインストール
      - name: Install dependencies
        run: composer install
        working-directory: backends/php-laravel

      # .env ファイルを環境別で生成（.env.{env_name} を .env にコピー）
      - name: Generate .env
        run: cp .env.${{ inputs.env_name }} .env
        working-directory: backends/php-laravel

      # データベースマイグレーションを実行
      - name: Run migrations
        run: php artisan migrate
        working-directory: backends/php-laravel

      # PHPUnit テストを実行
      - name: Run tests
        run: ./vendor/bin/phpunit
        working-directory: backends/php-laravel
