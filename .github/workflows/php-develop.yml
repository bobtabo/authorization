# PHP Develop CI ワークフロー
# developブランチの変更時にCIを実行
name: PHP Develop CI

# トリガー: developブランチへのプッシュで、backends/php-laravel/** の変更時のみ実行
on:
  push:
    branches:
      - develop
    paths:
      - 'backends/php-laravel/**'

jobs:
  test:
    # 共通テンプレート php.yml を使用し、develop環境の設定を渡す
    uses: ./.github/workflows/php.yml
    with:
      env_name: 'testing'
      db_name: 'authorization'
      db_user: 'develop'
      db_password: 'docker#DOCKER1234'
      db_host: 'mysql'
      redis_host: 'redis'
      redis_port: '6379'
