# PHP Production CI ワークフロー
# mainブランチの変更時にCIを実行
name: PHP Production CI

# トリガー: mainブランチへのプッシュで、backends/php-laravel/** の変更時のみ実行
on:
  push:
    branches:
      - main
    paths:
      - 'backends/php-laravel/**'

jobs:
  test:
    # 共通テンプレート php.yml を使用し、production環境の設定を渡す
    uses: ./.github/workflows/php.yml
    with:
      env_name: 'production'
      db_name: 'laravel_prod'
      db_user: 'root'
      db_password: 'root'
      db_host: 'mysql'
      redis_host: 'redis'
      redis_port: '6379'
