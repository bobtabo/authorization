# Python CI ワークフロー
# developブランチのbackends/python-fastapi/**変更時にCIを実行
name: Python CI

on:
  push:
    branches:
      - develop
    paths:
      - 'backends/python-fastapi/**'
  workflow_dispatch:

jobs:
  test:
    # Ubuntu ランナーを使用
    runs-on: ubuntu-latest

    # サービスコンテナ: MySQLとRedisをテスト用に起動
    services:
      mysql:
        image: mysql:8.0
        ports:
          - 3306:3306
        env:
          MYSQL_ROOT_PASSWORD: 'docker#DOCKER1234'
          MYSQL_DATABASE: 'authorization'
          MYSQL_USER: 'develop'
          MYSQL_PASSWORD: 'docker#DOCKER1234'
        options: --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

      redis:
        image: redis:latest
        ports:
          - 6379:6379
        options: --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=3

    # CI実行ステップ
    steps:
      - uses: actions/checkout@v4

      # Python をセットアップ（本番環境に合わせて 3.13 を使用）
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'

      # Python 依存関係をインストール
      - name: Install dependencies
        run: pip install -r requirements.txt
        working-directory: backends/python-fastapi

      # テスト用DBを作成（root で作成し develop に権限付与）
      - name: Create test database
        run: |
          mysql -h 127.0.0.1 -u root -p'docker#DOCKER1234' -e "
            CREATE DATABASE IF NOT EXISTS authorization_test CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;
            GRANT ALL PRIVILEGES ON authorization_test.* TO 'develop'@'%';
            FLUSH PRIVILEGES;
          "

      # テストを実行
      - name: Run tests
        run: python -m pytest tests/ -v
        working-directory: backends/python-fastapi
        env:
          DB_HOST: 127.0.0.1
          DB_PORT: 3306
          DB_DATABASE: authorization_test
          DB_USERNAME: develop
          DB_PASSWORD: "docker#DOCKER1234"
