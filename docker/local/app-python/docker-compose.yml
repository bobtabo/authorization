networks:
  authorization:
    external: true

services:
  nginx:
    container_name: ${NGINX_CONTAINER}
    build: nginx
    ports:
      - '${NGINX_HTTP_PORT}'
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - python
    environment:
      - APP_NAME=${APP_NAME}
      - SERVER_NAME=${SERVER_NAME}
      - APP_PATH=${APP_PATH}
      - VIRTUAL_HOST=${SERVER_NAME}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${SERVER_NAME}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - CERT_NAME=default
      - HTTPS_METHOD=noredirect
    networks:
      - authorization

  python:
    container_name: ${PYTHON_CONTAINER}
    build: python
    ports:
      - '${PYTHON_DEBUG_PORT}:5678'
    volumes:
      - ./../../../backends/python:/var/www/${APP_NAME}
    networks:
      - authorization
