networks:
  authorization:
    external: true

services:
  nginx:
    container_name: ${NGINX_CONTAINER}
    build: nginx
    ports:
      - '${NGINX_HTTP_PORT}'
    volumes:
      - ./nginx/templates:/etc/nginx/templates
      - ./../../../backends/php-laravel:/var/www/${APP_NAME}
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - php
    environment:
      - APP_NAME=${APP_NAME}
      - SERVER_NAME=${SERVER_NAME}
      - FASTCGI_PATH=${FASTCGI_PATH}
      - VIRTUAL_HOST=${SERVER_NAME}
      - VIRTUAL_PORT=80
      - LETSENCRYPT_HOST=${SERVER_NAME}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
      - CERT_NAME=default
      - HTTPS_METHOD=noredirect
    networks:
      - authorization

  php:
    container_name: ${PHP_CONTAINER}
    build: php
    ports:
      - '${PHP_XDEBUG_PORT}:9003'
    volumes:
      - ./../../../backends/php-laravel:/var/www/${APP_NAME}
      - ./php/docker.conf:/usr/local/etc/php-fpm.d/zz-docker.conf
      - ./php/php.ini:/usr/local/etc/php/php.ini
      - ./php/xdebug.ini:/usr/local/etc/php/conf.d/xdebug.ini
      - ./php/www.conf:/usr/local/etc/php-fpm.d/zzz-www.conf
    networks:
      - authorization
